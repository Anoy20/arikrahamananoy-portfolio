<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Video Tools</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #e5e7eb;
      padding: 32px;
    }

    .tool {
      border: 1px solid #334155;
      border-radius: 8px;
      padding: 20px;
      margin-top: 20px;
    }

    input, button {
      padding: 8px 12px;
      margin-top: 8px;
    }

    button {
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    button:disabled {
      background: #475569;
    }

    .status {
      margin-top: 10px;
      color: #93c5fd;
    }

    video, canvas {
      display: none;
    }
  </style>
</head>
<body>

  <!-- TOOL 2 UPDATED -->
  <div class="tool">
    <h2>Tool: Video → PNG Frames (ZIP Download)</h2>

    <input type="file" id="zipVideoInput" accept="video/*"><br><br>

    <button id="zipBtn" disabled>Generate ZIP</button>

    <div id="zipStatus" class="status"></div>

    <video id="zipVideo" preload="metadata"></video>
    <canvas id="zipCanvas"></canvas>
  </div>

  <!-- LIBRARIES -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>

  <script>
    const videoInput = document.getElementById("zipVideoInput");
    const zipBtn = document.getElementById("zipBtn");
    const status = document.getElementById("zipStatus");

    const video = document.getElementById("zipVideo");
    const canvas = document.getElementById("zipCanvas");
    const ctx = canvas.getContext("2d");

    let ready = false;

    videoInput.onchange = () => {
      const file = videoInput.files[0];
      if (!file) return;

      video.src = URL.createObjectURL(file);
      video.load();
      ready = false;
      zipBtn.disabled = true;
      status.textContent = "Loading video…";

      video.onloadedmetadata = () => {
        ready = true;
        zipBtn.disabled = false;
        status.textContent = `Ready (${Math.floor(video.duration)} seconds)`;
      };
    };

    zipBtn.onclick = async () => {
      if (!ready) return;

      zipBtn.disabled = true;
      status.textContent = "Creating ZIP…";

      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;

      const zip = new JSZip();
      const folder = zip.folder("frames");

      const duration = Math.floor(video.duration);

      for (let t = 0; t <= duration; t++) {
        await seek(video, t);

        ctx.drawImage(video, 0, 0);

        // draw timestamp text
        ctx.fillStyle = "white";
        ctx.font = "30px Arial";
        ctx.fillText(`Second: ${t}`, 20, 50);

        const blob = await new Promise(resolve =>
          canvas.toBlob(resolve, "image/png")
        );

        folder.file(`frame_${String(t).padStart(4, "0")}.png`, blob);

        status.textContent = `Processed ${t}/${duration}`;
      }

      const content = await zip.generateAsync({ type: "blob" });

      saveAs(content, "video-frames.zip");

      status.textContent = "ZIP downloaded.";
      zipBtn.disabled = false;
    };

    function seek(video, time) {
      return new Promise(resolve => {
        const handler = () => {
          video.removeEventListener("seeked", handler);
          resolve();
        };
        video.addEventListener("seeked", handler);
        video.currentTime = time;
      });
    }
  </script>

</body>
</html>
