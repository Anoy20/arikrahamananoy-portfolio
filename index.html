<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Video Tools</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #e5e7eb;
      padding: 32px;
    }

    h2 {
      margin-top: 40px;
    }

    input, button {
      padding: 8px 12px;
      margin-top: 8px;
      font-size: 14px;
    }

    button {
      border: none;
      border-radius: 6px;
      cursor: pointer;
      background: #2563eb;
      color: white;
    }

    button:disabled {
      background: #475569;
      cursor: not-allowed;
    }

    .download {
      background: #16a34a;
    }

    .section {
      border: 1px solid #334155;
      padding: 20px;
      border-radius: 8px;
      margin-top: 20px;
    }

    #status, #trimStatus {
      margin-top: 10px;
      color: #93c5fd;
    }

    video, canvas {
      display: none;
    }
  </style>
</head>
<body>

  <!-- ================= TOOL 1 ================= -->
  <div class="section">
    <h2>Tool 1: Video → Screenshot Every Second → PDF</h2>

    <input type="file" id="videoInput" accept="video/*"><br>
    <button id="generateBtn" disabled>Generate PDF</button>
    <button id="downloadBtn" class="download">Download PDF</button>

    <div id="status"></div>

    <video id="video" preload="metadata"></video>
    <canvas id="canvas"></canvas>
  </div>

  <!-- ================= TOOL 2 ================= -->
  <div class="section">
    <h2>Tool 2: Cut Video (Keep Middle Section)</h2>

    <input type="file" id="trimInput" accept="video/*"><br>

    <label>Start (seconds):</label><br>
    <input type="number" id="startTime" min="0" step="0.1"><br>

    <label>End (seconds):</label><br>
    <input type="number" id="endTime" min="0" step="0.1"><br>

    <button id="cutBtn" disabled>Cut & Download</button>

    <div id="trimStatus"></div>

    <video id="trimVideo" crossorigin="anonymous"></video>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <script>
    /* ================= TOOL 1 LOGIC ================= */
    const videoInput = document.getElementById("videoInput");
    const generateBtn = document.getElementById("generateBtn");
    const downloadBtn = document.getElementById("downloadBtn");
    const status = document.getElementById("status");
    const video = document.getElementById("video");
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");

    let pdfBlob = null;

    videoInput.addEventListener("change", () => {
      video.src = URL.createObjectURL(videoInput.files[0]);
      video.load();
      generateBtn.disabled = true;
      downloadBtn.style.display = "none";

      video.onloadedmetadata = () => {
        generateBtn.disabled = false;
        status.textContent = "Video ready.";
      };
    });

    generateBtn.onclick = async () => {
      generateBtn.disabled = true;
      status.textContent = "Processing…";

      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;

      const { jsPDF } = window.jspdf;
      const pdf = new jsPDF({
        orientation: canvas.width > canvas.height ? "landscape" : "portrait",
        unit: "px",
        format: [canvas.width, canvas.height]
      });

      const total = Math.floor(video.duration);

      for (let i = 0; i <= total; i++) {
        await seek(video, i);
        ctx.drawImage(video, 0, 0);
        const img = canvas.toDataURL("image/jpeg", 0.85);
        if (i > 0) pdf.addPage();
        pdf.addImage(img, "JPEG", 0, 0);
        status.textContent = `Captured ${i}/${total}`;
      }

      pdfBlob = pdf.output("blob");
      downloadBtn.style.display = "inline-block";
      status.textContent = "PDF ready.";
    };

    downloadBtn.onclick = () => {
      const url = URL.createObjectURL(pdfBlob);
      const a = document.createElement("a");
      a.href = url;
      a.download = "screenshots.pdf";
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      setTimeout(() => URL.revokeObjectURL(url), 500);
    };

    function seek(v, t) {
      return new Promise(r => {
        v.onseeked = r;
        v.currentTime = t;
      });
    }

    /* ================= TOOL 2 LOGIC ================= */
    const trimInput = document.getElementById("trimInput");
    const trimVideo = document.getElementById("trimVideo");
    const cutBtn = document.getElementById("cutBtn");
    const startTime = document.getElementById("startTime");
    const endTime = document.getElementById("endTime");
    const trimStatus = document.getElementById("trimStatus");

    let streamRecorder;
    let chunks = [];

    trimInput.onchange = () => {
      trimVideo.src = URL.createObjectURL(trimInput.files[0]);
      trimVideo.load();
      cutBtn.disabled = true;

      trimVideo.onloadedmetadata = () => {
        endTime.value = trimVideo.duration.toFixed(2);
        cutBtn.disabled = false;
        trimStatus.textContent = "Video ready for cutting.";
      };
    };

    cutBtn.onclick = async () => {
      const start = parseFloat(startTime.value);
      const end = parseFloat(endTime.value);

      if (start >= end || end > trimVideo.duration) {
        alert("Invalid start/end time");
        return;
      }

      trimStatus.textContent = "Recording trimmed video…";

      const stream = trimVideo.captureStream();
      streamRecorder = new MediaRecorder(stream);
      chunks = [];

      streamRecorder.ondataavailable = e => chunks.push(e.data);

      streamRecorder.onstop = () => {
        const blob = new Blob(chunks, { type: "video/webm" });
        const url = URL.createObjectURL(blob);

        const a = document.createElement("a");
        a.href = url;
        a.download = "trimmed-video.webm";
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);

        trimStatus.textContent = "Trimmed video downloaded.";
      };

      trimVideo.currentTime = start;
      await trimVideo.play();
      streamRecorder.start();

      setTimeout(() => {
        streamRecorder.stop();
        trimVideo.pause();
      }, (end - start) * 1000);
    };
  </script>

</body>
</html>
