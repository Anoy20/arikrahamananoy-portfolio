<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Video to PDF</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #e5e7eb;
      padding: 32px;
    }

    input, button {
      padding: 10px 14px;
      margin-top: 10px;
      font-size: 15px;
    }

    button {
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    #generateBtn {
      background: #2563eb;
      color: white;
    }

    #downloadBtn {
      background: #16a34a;
      color: white;
      display: none;
    }

    button:disabled {
      background: #475569;
      cursor: not-allowed;
    }

    #status {
      margin-top: 15px;
      color: #93c5fd;
    }

    video, canvas {
      display: none;
    }
  </style>
</head>
<body>

  <h2>Video → 1 Screenshot per Second → PDF</h2>

  <input type="file" id="videoInput" accept="video/*"><br>

  <button id="generateBtn" disabled>Generate PDF</button>
  <button id="downloadBtn">Download PDF</button>

  <div id="status"></div>

  <video id="video" preload="metadata"></video>
  <canvas id="canvas"></canvas>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <script>
    const videoInput = document.getElementById("videoInput");
    const generateBtn = document.getElementById("generateBtn");
    const downloadBtn = document.getElementById("downloadBtn");
    const status = document.getElementById("status");

    const video = document.getElementById("video");
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");

    let pdfBlob = null;

    videoInput.addEventListener("change", () => {
      const file = videoInput.files[0];
      if (!file) return;

      generateBtn.disabled = true;
      downloadBtn.style.display = "none";
      status.textContent = "Loading video…";

      video.src = URL.createObjectURL(file);
      video.load();

      video.onloadedmetadata = () => {
        generateBtn.disabled = false;
        status.textContent =
          `Ready. Duration: ${Math.floor(video.duration)} seconds`;
      };
    });

    generateBtn.addEventListener("click", async () => {
      generateBtn.disabled = true;
      status.textContent = "Processing frames…";

      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;

      const { jsPDF } = window.jspdf;

      const pdf = new jsPDF({
        orientation: canvas.width >= canvas.height ? "landscape" : "portrait",
        unit: "px",
        format: [canvas.width, canvas.height]
      });

      const duration = Math.floor(video.duration);

      for (let t = 0; t <= duration; t++) {
        await seek(video, t);

        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        const img = canvas.toDataURL("image/jpeg", 0.85);

        if (t > 0) pdf.addPage();
        pdf.addImage(img, "JPEG", 0, 0, canvas.width, canvas.height);

        status.textContent = `Captured ${t} / ${duration}`;
      }

      // IMPORTANT: convert to blob
      pdfBlob = pdf.output("blob");

      downloadBtn.style.display = "inline-block";
      status.textContent = "PDF ready. Click download.";
    });

    downloadBtn.addEventListener("click", () => {
      if (!pdfBlob) return;

      const url = URL.createObjectURL(pdfBlob);

      const a = document.createElement("a");
      a.href = url;
      a.download = "video-screenshots.pdf";

      // MUST be in DOM for reliable download
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);

      setTimeout(() => URL.revokeObjectURL(url), 500);
    });

    function seek(video, time) {
      return new Promise(resolve => {
        const handler = () => {
          video.removeEventListener("seeked", handler);
          resolve();
        };
        video.addEventListener("seeked", handler);
        video.currentTime = time;
      });
    }
  </script>

</body>
</html>
